tables:
  metrics_facts:
    description: "Фактические и плановые значения метрик по подразделениям Сбербанка"
    columns:
      metric_id: "Идентификатор метрики (FK → metrics_dict.metric_id)"
      metric_level: "Уровень агрегации: ВСП (доп.офис) / ГОСБ (отделение) / ТБ (территориальный банк) / СБ (Сбербанк)"
      struct_code: "Код подразделения (FK → struct_code.struct_code)"
      period_type: "Тип периода: D (день) / W (неделя) / M (месяц)"
      metric_type: "Тип показателя: plan (плановый) / fact (фактический)"
      report_dt: "Дата, на которую сформирован показатель (конец периода)"
      value: "Значение показателя (Float64)"
  struct_code:
    description: "Справочник подразделений Сбербанка с иерархией СБ → ТБ → ГОСБ → ВСП"
    columns:
      struct_code: "Уникальный код подразделения. Для ТБ = tb_id, для ГОСБ = gosb_id, для ВСП = 'tb_id_gosb_id_NNN'"
      struct_lvl: "Уровень: СБ (Сбербанк), ТБ (территориальный банк), ГОСБ (отделение), ВСП (доп.офис)"
      tb_id: "Идентификатор территориального банка"
      gosb_id: "Идентификатор отделения (ГОСБ)"
      tb_name: "Название ТБ (например, 'Уральский банк')"
      gosb_name: "Название ГОСБ (например, 'Свердловское отделение №7003')"
      vsp_name: "Название ВСП (например, 'Доп.офис №7003/001') или название ТБ/ГОСБ для верхних уровней"
  metrics_dict:
    description: "Справочник метрик (ключевых показателей)"
    columns:
      metric_id: "Уникальный идентификатор метрики"
      metric_name: "Название метрики на русском языке"

glossary:
  боевка: "Боевая численность — используй search_metrics с запросом 'боевая численность'"
  боевая: "Боевая численность — используй search_metrics с запросом 'боевая численность'"
  скм: "Старший клиентский менеджер — роль в Сбербанке, уточни через search_metrics запросом 'СКМ'"
  смрк: "Старший менеджер по работе с клиентами — роль, уточни через search_metrics запросом 'СМРК'"
  смо: "Старший менеджер обслуживания — роль, уточни через search_metrics запросом 'СМО'"
  мо: "Массовые роли — используй search_metrics с запросом 'МО' или 'массовых ролей'"
  суп: "Среднесписочная численность персонала — используй search_metrics с запросом 'СУП'"
  текучка: "Текучесть персонала — используй search_metrics с запросом 'текучесть'"
  кпэ: "Ключевые показатели эффективности, метрики очередей — используй search_metrics с запросом 'КПЭ'"
  кпе: "Ключевые показатели эффективности, метрики очередей — используй search_metrics с запросом 'КПЭ'"
  очередь: "КПЭ очередей — метрики ожидания, используй search_metrics с запросом 'КПЭ очередей'"
  новички: "Новые сотрудники за 3 месяца — используй search_metrics с запросом 'новички'"
  производительность: "Производительность сотрудников — используй search_metrics с запросом 'производительность'"
  всп: "Дополнительный офис — низший уровень подразделений (struct_lvl = 'ВСП')"
  гособ: "Отделение Сбербанка — средний уровень (struct_lvl = 'ГОСБ')"
  тб: "Территориальный банк — уровень выше ГОСБ (struct_lvl = 'ТБ')"
  сб: "Сбербанк — верхний уровень иерархии (struct_lvl = 'СБ')"
  план: "metric_type = 'plan' — плановое значение показателя"
  факт: "metric_type = 'fact' — фактическое значение показателя"

business_context: |
  Организационная иерархия Сбербанка:
  - СБ (Сбербанк) — верхний уровень, struct_code = 'СБ'
  - ТБ (Территориальный банк) — struct_code = tb_id (например, '13', '16', '40')
  - ГОСБ (Отделение) — struct_code = gosb_id (например, '8592', '7003')
  - ВСП (Доп.офис) — struct_code = '{tb_id}_{gosb_id}_{NNN}'

  Группы метрик:
  - Численность (metric_id 1-4): количество сотрудников по ролям
  - СУП (5-9): среднесписочная численность
  - Обслуженные клиенты/талоны (10-11): абсолютные количества
  - Производительность (12-13): клиентов/час или аналогичный показатель
  - КПЭ очередей (14-25): абсолютные количества и доли по времени ожидания
  - Новички (26-31): количество и доля неуспешных за 3 месяца
  - Текучесть (32-39): уволенные и доли текучести

  Данные охватывают период с мая 2024 по апрель 2025 (report_dt). Не запрашивайте данные за пределами этого диапазона.
  При фильтрации по датам используйте конкретные даты (например, report_dt = '2025-01-31') или INTERVAL.
  Функции addMonths/subtractMonths также поддерживаются.
  Для месячных данных report_dt всегда равен последнему дню месяца (например, 2025-01-31, 2025-02-28).